
services:
  postgres:
    image: postgres:15-alpine
    container_name: rate_tracker_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-rate_tracker}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rate_tracker_network

  redis:
    image: redis:7-alpine
    container_name: rate_tracker_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rate_tracker_network

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rate_tracker_django
    command: sh -c "python manage.py migrate && bash scripts/bootstrap.sh && gunicorn rate_tracker.wsgi:application --bind 0.0.0.0:8000 --reload --timeout 120 --access-logfile - --error-logfile -"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DB_NAME: ${DB_NAME:-rate_tracker}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ALLOWED_HOSTS: localhost,127.0.0.1,django
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/rates/latest/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - rate_tracker_network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rate_tracker_celery_worker
    command: celery -A rate_tracker worker -l info
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DB_NAME: ${DB_NAME:-rate_tracker}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    healthcheck:
      test: ["CMD", "celery", "-A", "rate_tracker", "inspect", "active"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - postgres
      - redis
      - django
    volumes:
      - .:/app
    networks:
      - rate_tracker_network

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rate_tracker_celery_beat
    command: celery -A rate_tracker beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DB_NAME: ${DB_NAME:-rate_tracker}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
      - django
    volumes:
      - .:/app
    networks:
      - rate_tracker_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rate_tracker_frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      - django
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - rate_tracker_network

volumes:
  postgres_data:
  redis_data:

networks:
  rate_tracker_network:
    driver: bridge
